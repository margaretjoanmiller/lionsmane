services:
  lionsmane-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    ports:
      - "6789:5432"
    volumes:
      - lionsmane-db-data:/var/lib/postgresql/data
    networks:
      - application_network
      


volumes:
  lionsmane-db-data:

networks:
  application_network:
