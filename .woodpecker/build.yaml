when:
  - event: tag

steps:
  publish-container:
    image: woodpeckerci/plugin-kaniko
    settings:
      repo: 0x4d6165/lionsmane
      platforms: linux/amd64
      registry: codeberg.org
      cache: true
      tag: ${CI_COMMIT_TAG}
      username: ${CI_REPO_OWNER}
      password:
        from_secret: codeberg