services:
  db:
    image: groonga/pgroonga:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: lion
    volumes:
      - db:/data/postgres
    ports:
      - "5423:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
  valkey:
    container_name: valkey
    image: valkey/valkey:latest
    ports:
      - "6379:6379"
    environment:
      VALKEY_EXTRA_FLAGS: "--appendonly yes"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - valkey:/data
  vault:
    image: openbao/openbao:2.4
    volumes:
      - /openbao/config:/openbao/config
      - /openbao/file:/openbao/file
    ports:
      - "8200:8200"
  lionsmane-be:
    build:
      context: .
      target: lionsmane-be
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_HOST: valkey
      NODE_ENV: production
    ports:
      - "8181:8181"
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy

  lionsmane-fe:
    build:
      context: lionsmane-fe
      target: lionsmane-fe
    environment:
      VITE_API_URL: http://lionsmane-be:8181
      SITE_ADDRESS: http://localhost
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  db:
  valkey:
