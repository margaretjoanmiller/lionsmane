services:
  db:
    image: groonga/pgroonga:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: lion
    volumes:
      - db:/var/lib/postgresql/data
    ports:
      - "5423:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
  valkey:
    container_name: valkey
    image: valkey/valkey:latest
    ports:
      - "6379:6379"
    environment:
      VALKEY_EXTRA_FLAGS: "--appendonly yes"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - valkey:/data
  vault:
    image: openbao/openbao
    container_name: vault
    hostname: vault
    ports:
      - 8200:8200
    volumes:
      - ./vault-policy.hcl:/openbao/policy/vault-policy.hcl
      - ./config.hcl:/openbao/config/config.hcl
      - vault-data:/openbao/file/
    environment:
      - VAULT_ADDR=http://localhost:8200
    cap_add:
      - IPC_LOCK
    command: server
    restart: always

  vault-init:
    image: openbao/openbao
    container_name: vault-init
    environment:
      - VAULT_ADDR=http://vault:8200
      - MY_VAULT_TOKEN=${MY_VAULT_TOKEN:-test}
    volumes:
      - ./vault-root-token:/openbao/file/vault-root-token
      - ./vault-init.sh:/usr/local/bin/vault-init.sh
      - vault-data:/openbao/file/
    command: /usr/local/bin/vault-init.sh
    depends_on:
      - vault
  lionsmane-be:
    build:
      context: ../.
      target: lionsmane-be
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      REDIS_HOST: valkey
      NODE_ENV: production
      CORS_ORIGIN: "https://lionsmane.wanderingwires.net"
    ports:
      - "8181:8181"
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy

volumes:
  db:
  valkey:
  vault-data:
