services:
  db:
    build: ./db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: lion
    volumes:
      - db:/var/lib/postgresql
    ports:
      - "5423:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
  valkey:
    container_name: valkey
    image: valkey/valkey:latest
    ports:
      - "6379:6379"
    environment:
      VALKEY_EXTRA_FLAGS: "--appendonly yes"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - valkey:/data
  vault:
    image: openbao/openbao:2.4
    environment:
      BAO_DEV_ROOT_TOKEN_ID: ${BAO_TOKEN}
      BAO_DEV_LISTEN_ADDRESS: "0.0.0.0:1337"
    ports:
      - "1337:1337"
  lionsmane-be:
    build:
      context: .
      target: lionsmane-be
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_HOST: valkey
    ports:
      - "8181:8181"
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy

  lionsmane-fe:
    build:
      context: lionsmane-fe
      target: lionsmane-fe
    environment:
      VITE_API_URL: http://lionsmane-be:8181
      SITE_ADDRESS: http://localhost
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  db:
  valkey:
